name: Issue Analyzer

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    name: Analyze and Triage Issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: Analizá este issue del repositorio Tetris (vanilla JS, sin dependencias). Asigná 1-3 labels (bug, enhancement, game-mechanics, ui/ux, controls, scoring, performance, question, duplicate) y posteá un comentario con diagnóstico técnico que incluya descripción del problema, área de código afectada (game.js/style.css/index.html), y enfoque sugerido. Usa gh CLI para agregar labels y comentarios.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
